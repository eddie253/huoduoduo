name: mobile_flutter
description: Didi Express Flutter migration shell (v1).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.3.0
  dio: ^5.7.0
  path: ^1.9.1
  device_info_plus: ^10.1.2
  flutter_secure_storage: ^9.2.2
  flutter_inappwebview: ^6.1.5
  sqflite: ^2.4.2
