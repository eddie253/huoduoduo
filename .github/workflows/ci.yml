name: Monorepo CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  legacy_baseline_readonly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce legacy baseline read-only
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash ops/ci/check-legacy-baseline-readonly.sh

  bff_gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm --workspace apps/bff_gateway run lint
      - name: Test with coverage
        run: npm --workspace apps/bff_gateway run test:coverage -- --runInBand
      - name: Build
        run: npm --workspace apps/bff_gateway run build
      - name: Route diff check
        run: node ops/ci/check-route-diff.js
      - name: Error-code map check
        run: node ops/ci/check-error-code-map.js
      - name: Audit high (warn only)
        continue-on-error: true
        run: npm --workspace apps/bff_gateway run audit:high
      - name: Collect BFF coverage artifacts
        run: node ops/ci/collect-coverage.js --component bff
      - name: Upload BFF coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bff
          path: reports/coverage/bff
          if-no-files-found: error

  mobile_flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test --coverage
      - name: Check Flutter line coverage threshold
        working-directory: .
        run: node ops/ci/check-flutter-coverage.js apps/mobile_flutter/coverage/lcov.info 40
      - name: Build Android debug APK
        run: flutter build apk --debug
      - name: Collect mobile coverage artifacts
        working-directory: .
        run: node ops/ci/collect-coverage.js --component mobile
      - name: Upload mobile coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mobile
          path: reports/coverage/mobile
          if-no-files-found: error

  mobile_flutter_ios_compile:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install deps
        run: flutter pub get
      - name: Build iOS without codesign
        run: flutter build ios --no-codesign

  contract_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate OpenAPI file exists
        run: test -f contracts/openapi/huoduoduo-v1.openapi.yaml
      - name: Validate JS bridge contract exists
        run: test -f contracts/bridge/js-bridge-v1.md

  coverage_report:
    runs-on: ubuntu-latest
    needs: [bff_gateway, mobile_flutter]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download BFF coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-bff
          path: reports/coverage/bff
      - name: Download mobile coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-mobile
          path: reports/coverage/mobile
      - name: Build coverage summary
        run: node ops/ci/collect-coverage.js --component summary && node ops/ci/generate-coverage-html.js
      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: reports/coverage
          if-no-files-found: error
