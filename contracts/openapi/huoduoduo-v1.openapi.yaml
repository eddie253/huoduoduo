openapi: 3.1.0
info:
  title: Huoduoduo Express BFF API
  version: 0.2.10
  description: Transitional REST API in front of legacy SOAP services (UAT baseline).
  x-doc-id: HDD-OPENAPI-CONTRACT
  x-owner: BFF Lead
  x-last-updated: 2026-03-04
  x-review-status: Draft for management review
  x-language-pair:
    zh-TW: docs/architecture/API_SPEC_OPENAPI_PLAN24.zh-TW.md
    en: docs/architecture/API_SPEC_OPENAPI_PLAN24.en.md
servers:
  - url: https://api.example.com/v1
    description: Production
  - url: http://localhost:3000/v1
    description: Local
tags:
  - name: Health
  - name: Auth
  - name: Bootstrap
  - name: Push
  - name: Shipments
  - name: Reservations
  - name: Proxy
  - name: Currency
  - name: System
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check.
      responses:
        "200":
          description: Service healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    maxLength: 32
                  service:
                    type: string
                    maxLength: 64
                  timestamp:
                    type: string
                    format: date-time
                    maxLength: 40
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and issue access/refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login success.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "422":
          $ref: '#/components/responses/LegacyBusinessError'
        "502":
          $ref: '#/components/responses/LegacyTransportError'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  maxLength: 1024
      responses:
        "200":
          description: Refresh success.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
  /auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Revoke refresh token.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  maxLength: 1024
      responses:
        "200":
          description: Logout success.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
                  subject:
                    type: string
                    maxLength: 64
  /bootstrap/webview:
    get:
      tags: [Bootstrap]
      security:
        - bearerAuth: []
      summary: Get webview startup metadata and cookies.
      responses:
        "200":
          description: Bootstrap metadata.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebviewBootstrap'
  /bootstrap/bulletin:
    get:
      tags: [Bootstrap]
      security:
        - bearerAuth: []
      summary: Get current bulletin text for top announcement strip.
      responses:
        "200":
          description: Bulletin response.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulletinResponse'
  /push/register:
    post:
      tags: [Push]
      security:
        - bearerAuth: []
      summary: Register device push token to legacy backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPushTokenRequest'
      responses:
        "200":
          description: Registration accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  registeredAt:
                    type: string
                    format: date-time
                    maxLength: 40
  /push/unregister:
    post:
      tags: [Push]
      security:
        - bearerAuth: []
      summary: Unregister device push token from legacy backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnregisterPushTokenRequest'
      responses:
        "200":
          description: Unregister accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  unregisteredAt:
                    type: string
                    format: date-time
                    maxLength: 40
  /system/version:
    get:
      tags: [System]
      summary: Get latest application version code from legacy system.
      parameters:
        - $ref: '#/components/parameters/SystemVersionName'
      responses:
        "200":
          description: Latest application version code.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersionResponse'
  /shipments/{trackingNo}:
    get:
      tags: [Shipments]
      security:
        - bearerAuth: []
      summary: Get shipment detail (GetShipment_elf fallback GetShipment).
      parameters:
        - name: trackingNo
          in: path
          required: true
          schema:
            type: string
            maxLength: 32
      responses:
        "200":
          description: Shipment detail payload.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentResponse'
        "422":
          $ref: '#/components/responses/LegacyBusinessError'
        "502":
          $ref: '#/components/responses/LegacyTransportError'
  /shipments/{trackingNo}/delivery:
    post:
      tags: [Shipments]
      security:
        - bearerAuth: []
      summary: Submit shipment delivery payload.
      parameters:
        - name: trackingNo
          in: path
          required: true
          schema:
            type: string
            maxLength: 32
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryRequest'
      responses:
        "200":
          description: Accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /shipments/{trackingNo}/exception:
    post:
      tags: [Shipments]
      security:
        - bearerAuth: []
      summary: Submit shipment exception payload.
      parameters:
        - name: trackingNo
          in: path
          required: true
          schema:
            type: string
            maxLength: 32
        - $ref: '#/components/parameters/IdempotencyKeyRequiredHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExceptionRequest'
      responses:
        "200":
          description: Accepted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /orders/{trackingNo}/accept:
    post:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Accept order with idempotency protection.
      parameters:
        - name: trackingNo
          in: path
          required: true
          schema:
            type: string
            maxLength: 32
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        "200":
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Missing idempotency key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Order already accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /drivers/location:
    post:
      tags: [DriverLocation]
      security:
        - bearerAuth: []
      summary: Submit one driver location point.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
      responses:
        "200":
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /drivers/location/batch:
    post:
      tags: [DriverLocation]
      security:
        - bearerAuth: []
      summary: Submit driver locations in batch (max 20).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationBatchRequest'
      responses:
        "200":
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "413":
          description: Batch size exceeds limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /reservations:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: List reservations by mode.
      parameters:
        - $ref: '#/components/parameters/ReservationMode'
      responses:
        "200":
          description: Reservation list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReservationResponse'
    post:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Create reservation by mode.
      parameters:
        - $ref: '#/components/parameters/ReservationMode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        "200":
          description: Reservation created.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservationNo:
                    type: string
                    maxLength: 64
                  mode:
                    type: string
                    maxLength: 16
                    enum: [standard, bulk]
  /reservations/zip-areas:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Get reservable ZIP/area list.
      responses:
        "200":
          description: Reservable ZIP/area list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSupportListResponse'
  /reservations/available:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Get reservable shipment list (standard) by ZIP.
      parameters:
        - $ref: '#/components/parameters/ReservationSupportZip'
      responses:
        "200":
          description: Reservable standard shipment list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSupportListResponse'
  /reservations/available/bulk:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Get reservable shipment list (bulk) by ZIP.
      parameters:
        - $ref: '#/components/parameters/ReservationSupportZip'
      responses:
        "200":
          description: Reservable bulk shipment list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSupportListResponse'
  /reservations/area-codes:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Get reservation area-code list.
      responses:
        "200":
          description: Reservation area-code list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSupportListResponse'
  /reservations/arrived:
    get:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Get arrived-to-warehouse shipment list.
      responses:
        "200":
          description: Arrived shipment list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationSupportListResponse'
  /reservations/{id}:
    delete:
      tags: [Reservations]
      security:
        - bearerAuth: []
      summary: Delete reservation by id and mode.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - $ref: '#/components/parameters/ReservationMode'
        - name: address
          in: query
          required: true
          schema:
            type: string
            maxLength: 512
      responses:
        "200":
          description: Reservation deleted.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /proxy/mates:
    get:
      tags: [Proxy]
      security:
        - bearerAuth: []
      summary: Get proxy mates by area.
      parameters:
        - $ref: '#/components/parameters/ProxyArea'
      responses:
        "200":
          description: Proxy mate list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyMateListResponse'
  /proxy/kpi/search:
    get:
      tags: [Proxy]
      security:
        - bearerAuth: []
      summary: Search proxy KPI by year, month and area.
      parameters:
        - $ref: '#/components/parameters/ProxyYear'
        - $ref: '#/components/parameters/ProxyMonth'
        - $ref: '#/components/parameters/ProxyArea'
      responses:
        "200":
          description: Proxy KPI search list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyKpiListResponse'
  /proxy/kpi:
    get:
      tags: [Proxy]
      security:
        - bearerAuth: []
      summary: Get proxy KPI by year, month and area.
      parameters:
        - $ref: '#/components/parameters/ProxyYear'
        - $ref: '#/components/parameters/ProxyMonth'
        - $ref: '#/components/parameters/ProxyArea'
      responses:
        "200":
          description: Proxy KPI list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyKpiListResponse'
  /proxy/kpi/daily:
    get:
      tags: [Proxy]
      security:
        - bearerAuth: []
      summary: Get daily proxy KPI by date and area.
      parameters:
        - $ref: '#/components/parameters/ProxyDate'
        - $ref: '#/components/parameters/ProxyArea'
      responses:
        "200":
          description: Proxy daily KPI list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyKpiListResponse'
  /currency/daily:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get daily currency statement.
      parameters:
        - $ref: '#/components/parameters/CurrencyDate'
      responses:
        "200":
          description: Daily currency list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
  /currency/monthly:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get monthly currency statement.
      parameters:
        - $ref: '#/components/parameters/CurrencyDate'
      responses:
        "200":
          description: Monthly currency list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
  /currency/balance:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get current driver balance.
      responses:
        "200":
          description: Balance list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
  /currency/deposit/head:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get deposit summary list by date range.
      parameters:
        - $ref: '#/components/parameters/CurrencyStartDate'
        - $ref: '#/components/parameters/CurrencyEndDate'
      responses:
        "200":
          description: Deposit summary list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
  /currency/deposit/body:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get deposit detail list by tracking number and address.
      parameters:
        - $ref: '#/components/parameters/CurrencyTnum'
        - $ref: '#/components/parameters/CurrencyAddress'
      responses:
        "200":
          description: Deposit detail list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
  /currency/shipment:
    get:
      tags: [Currency]
      security:
        - bearerAuth: []
      summary: Get shipment currency list by order number.
      parameters:
        - $ref: '#/components/parameters/CurrencyOrderNum'
      responses:
        "200":
          description: Shipment currency list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Expires:
              $ref: '#/components/headers/ExpiresZero'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyListResponse'
components:
  headers:
    CacheControlNoStore:
      description: No-store policy for sensitive and transaction responses.
      schema:
        type: string
      example: no-store, no-cache, must-revalidate
    PragmaNoCache:
      description: Legacy-compatible no-cache directive.
      schema:
        type: string
      example: no-cache
    ExpiresZero:
      description: Expiration forced to immediate.
      schema:
        type: string
      example: "0"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKeyHeader:
      name: X-Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    IdempotencyKeyRequiredHeader:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 128
    ReservationMode:
      name: mode
      in: query
      required: false
      schema:
        type: string
        enum: [standard, bulk]
        default: standard
    ReservationSupportZip:
      name: zip
      in: query
      required: true
      schema:
        type: string
        maxLength: 64
    ProxyArea:
      name: area
      in: query
      required: true
      schema:
        type: string
        maxLength: 64
    ProxyYear:
      name: year
      in: query
      required: true
      schema:
        type: string
        maxLength: 4
        pattern: '^\d{4}$'
    ProxyMonth:
      name: month
      in: query
      required: true
      schema:
        type: string
        maxLength: 2
        pattern: '^\d{1,2}$'
    ProxyDate:
      name: date
      in: query
      required: true
      schema:
        type: string
        maxLength: 10
